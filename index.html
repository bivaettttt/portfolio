<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тимур Надршин — Портфолио</title>
    <meta name="description" content="Портфолио frontend-разработчика Тимура Надршина">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="card" role="region" aria-labelledby="title">
            <h1 id="title">Привет! Я Тимур 👋</h1>
            <p class="lead">
            Здесь собираю свои проекты, эксперименты и учебные работы по фронтенду.
            Нажми кнопку ниже — и перейдёшь к полному портфолио.
            </p>

            <!-- Кнопка ведёт на следующую страницу -->
            <a class="cta" href="portfolio.html" aria-label="Перейти к портфолио">
            Смотреть портфолио
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            </a>

            <div class="meta">или нажми <strong>Enter</strong></div>

            <footer>© 2025 Тимур Надршин</footer>
        </section>
    </main>

    <script>
    // Удобный переход по Enter/Space на чистой странице
    document.addEventListener('keydown', (e) => {
        if (['Enter', ' '].includes(e.key)) {
        window.location.href = 'portfolio.html';
        }
    });
    </script>
</body>
</html>
